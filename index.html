<!doctype html>
<html lang="ja">
<head>
<link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>測定値記入表</title>
<style>
:root{--bg:#f3f6fb;--panel:#fff;--ink:#0f172a;--muted:#64748b;--line:#d7deea;--blue:#2f6eea;--ok:#16a34a;--warn:#d97706;--ng:#dc2626;--head:#0d1726;--kb:#eaf0f9}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:manipulation}.app{max-width:760px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}.fixedTop{flex:0 0 auto;background:var(--bg);z-index:10;box-shadow:0 2px 10px rgba(15,23,42,.08)}.top{background:var(--head);color:white;padding:14px 14px 12px}.title{display:flex;align-items:center;gap:10px}.title h1{font-size:20px;margin:0;flex:1}.btn{border:1px solid #cbd5e1;background:#fff;border-radius:14px;padding:10px 12px;font-weight:700;color:#172033}.top .btn{background:#192437;color:#e2e8f0;border-color:#475569}.tabs,.slots{display:flex;gap:8px;overflow:auto;padding:12px 14px 0}.tab,.slot{border:1px solid var(--line);background:#e7edf8;border-radius:18px;padding:10px 16px;font-weight:800;white-space:nowrap}.active{background:var(--blue)!important;color:white!important;border-color:var(--blue)!important}.summary{margin:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:12px;display:flex;justify-content:space-between;gap:8px;align-items:center}.cards{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:0 14px 430px;min-height:0}.card{background:white;border:2px solid var(--line);border-radius:20px;padding:12px;margin:12px 0;display:grid;grid-template-columns:105px 1fr 92px;gap:12px;align-items:center}.card.selected{border:4px solid #7aa7ff;box-shadow:0 0 0 4px rgba(47,110,234,.12)}.thumb{width:105px;height:86px;border:1px solid #cbd5e1;border-radius:14px;background:#f8fafc;object-fit:contain}.name{font-size:18px;font-weight:900}.meta{color:var(--muted);font-size:13px;margin-top:4px}.value{font-size:28px;font-weight:900;color:#1d4ed8;margin-top:6px;min-height:34px}.badge{border-radius:14px;border:2px solid var(--line);padding:8px 4px;text-align:center;font-weight:900}.badge.ok{color:var(--ok);border-color:var(--ok);background:#ecfdf5}.badge.warn{color:var(--warn);border-color:var(--warn);background:#fff7ed}.badge.ng{color:var(--ng);border-color:var(--ng);background:#fef2f2}.small{font-size:12px;margin-top:5px}.keyboard{position:fixed;left:0;right:0;bottom:0;background:var(--kb);padding:12px max(12px,env(safe-area-inset-left)) calc(12px + env(safe-area-inset-bottom));z-index:20;touch-action:manipulation;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;overscroll-behavior:contain}.key{touch-action:manipulation;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}.keygrid{max-width:760px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.key{height:54px;border:1px solid #cbd5e1;background:white;border-radius:16px;font-size:22px;font-weight:900}.key.danger{background:#fde7ef;color:#d63a6a}.key.warn{background:#fff3c9;color:#9a6a00}.key.go{background:#e7f0ff;color:#2f6eea}.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;z-index:30;align-items:center;justify-content:center;padding:18px}.modal.show{display:flex}.box{background:white;border-radius:22px;max-width:680px;width:100%;max-height:88vh;overflow:auto;padding:18px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin:10px 0}.field label{font-size:13px;font-weight:800;color:#475569;display:block;margin-bottom:4px}.field input,.field select,.field textarea{width:100%;font-size:16px;padding:10px;border:1px solid #cbd5e1;border-radius:12px}.settingsItem{border:1px solid var(--line);border-radius:16px;padding:10px;margin:10px 0}.actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:14px}.red{background:#dc2626;color:white;border-color:#dc2626}.ghost{background:#f8fafc}.hidden{display:none}@media(max-width:430px){.card{grid-template-columns:88px 1fr 76px;gap:9px}.thumb{width:88px;height:76px}.name{font-size:16px}.value{font-size:24px}.badge{font-size:13px}.key{height:52px}.row{grid-template-columns:1fr}}
</style>
</head>
<body><div class="app"><div class="fixedTop"><header class="top"><div class="title"><h1>測定値記入表</h1><button class="btn" id="resetBtn">リセット</button><button class="btn" id="settingsBtn">⚙ 設定</button></div></header><nav class="tabs" id="productTabs"></nav><nav class="slots" id="slotTabs"></nav><div class="summary"><b id="dateLabel"></b><span id="countLabel"></span></div></div><main class="cards" id="cards"></main></div><div class="keyboard"><div class="keygrid" id="keys"></div></div>
<div class="modal" id="resetModal"><div class="box"><h2>入力値をリセットしますか？</h2><p>現在の製品・記録枠の入力値だけを消去します。設定や画像は消えません。</p><div class="actions"><button class="btn ghost" data-close>キャンセル</button><button class="btn red" id="doReset">リセット</button></div></div></div>
<div class="modal" id="settingsModal"><div class="box"><h2>設定</h2><p style="color:#64748b">サンプル版です。製品・測定箇所・PNG・JSON入出力をこの画面で編集できます。</p><div class="actions"><button class="btn" id="addProduct">製品追加</button><button class="btn" id="exportJson">設定をJSONに保存</button><label class="btn">設定をJSONから呼出<input id="importJson" type="file" accept="application/json" class="hidden"></label></div><div id="settingsList"></div><div class="actions"><button class="btn ghost" data-close>閉じる</button><button class="btn" id="saveSettings">保存</button></div></div></div>
<script>
const DB_NAME='measurement-entry-db-v1', STORE='state';
const $=s=>document.querySelector(s); const uid=()=>Math.random().toString(36).slice(2,10);
let state={products:[],currentProduct:0,currentSlot:0,selected:0,inputs:{}};
function svg(label){return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="300" height="220" viewBox="0 0 300 220"><rect width="300" height="220" rx="24" fill="#f8fafc"/><path d="M45 110h210" stroke="#64748b" stroke-width="10" stroke-linecap="round"/><circle cx="150" cy="110" r="62" fill="none" stroke="#64748b" stroke-width="9"/><path d="M200 60l42-36" stroke="#64748b" stroke-width="6"/><text x="150" y="203" text-anchor="middle" font-size="32" font-weight="700" fill="#334155">${label}</text></svg>`)}
function sample(){return {products:[{id:uid(),name:'サンプル製品A',slots:['初物','中物','終物'],items:[{id:uid(),name:'φA 外径',unit:'mm',kind:'φ',specType:'range',lower:9.995,upper:10.005,threshold:20,image:svg('φA')},{id:uid(),name:'B溝幅',unit:'mm',kind:'幅',specType:'range',lower:1.2,upper:1.23,threshold:20,image:svg('B')},{id:uid(),name:'C面角度',unit:'°',kind:'角度',specType:'range',lower:44.5,upper:45.5,threshold:20,image:svg('C')},{id:uid(),name:'D面粗さ',unit:'',kind:'Rz',specType:'upper',lower:null,upper:3.2,threshold:20,image:svg('Rz')}]}],currentProduct:0,currentSlot:0,selected:0,inputs:{}}}
function openDb(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function save(){const db=await openDb();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(state,'state');tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})}
async function load(){try{const db=await openDb();const got=await new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).get('state');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)}); state=got||sample(); await save()}catch(e){state=sample()}}
function curP(){return state.products[state.currentProduct]} function curSlot(){return curP().slots[state.currentSlot]||'初物'}
function inputKey(itemId){return curP().id+'::'+curSlot()+'::'+itemId}
function judge(v,item){if(v===''||v==null)return {text:'未入力',cls:'',sub:''}; const n=Number(v); if(!Number.isFinite(n))return {text:'ERR',cls:'ng',sub:'数値確認'}; const type=item.specType||'range'; let margin=100; if(type==='upper'){ const upper=Number(item.upper); if(n>upper)return {text:'NG',cls:'ng',sub:'上限超え'}; margin=upper===0?100:Math.max(0,Math.min(100,100*(1-n/upper))); }else{ if(n<Number(item.lower))return {text:'NG',cls:'ng',sub:'下限未満'}; if(n>Number(item.upper))return {text:'NG',cls:'ng',sub:'上限超え'}; const mid=(Number(item.upper)+Number(item.lower))/2, half=(Number(item.upper)-Number(item.lower))/2; margin=half===0?100:Math.max(0,100*(1-Math.abs(n-mid)/half)); } if(margin<Number(item.threshold||0))return {text:'警告',cls:'warn',sub:`余裕率 ${Math.round(margin)}%`}; return {text:'OK',cls:'ok',sub:`余裕率 ${Math.round(margin)}%`}}
function specText(it){const type=it.specType||'range'; if(type==='upper')return `${it.kind||''}${it.upper}${it.unit||''}以下`; return `${it.kind||''}${it.lower}~<br>${it.upper}${it.unit||''}`;}
function render(){const p=curP(); $('#dateLabel').textContent=new Date().toLocaleDateString('ja-JP'); $('#productTabs').innerHTML=state.products.map((p,i)=>`<button class="tab ${i===state.currentProduct?'active':''}" onclick="selProduct(${i})">${p.name}</button>`).join(''); $('#slotTabs').innerHTML=p.slots.map((s,i)=>`<button class="slot ${i===state.currentSlot?'active':''}" onclick="selSlot(${i})">${s}</button>`).join(''); let ng=0,w=0,filled=0; $('#cards').innerHTML=p.items.map((it,i)=>{let val=state.inputs[inputKey(it.id)]||''; let j=judge(val,it); if(j.cls==='ng')ng++; if(j.cls==='warn')w++; if(val!=='')filled++; return `<section class="card ${i===state.selected?'selected':''}" onclick="selectCard(${i})" id="card-${i}"><img class="thumb" src="${it.image||svg('?')}"><div><div class="name">${it.name}</div><div class="meta">${specText(it)}</div><div class="value">${val||'—'}</div></div><div class="badge ${j.cls}">${j.text}<div class="small">${j.sub}</div></div></section>`}).join(''); $('#countLabel').textContent=`入力 ${filled}/${p.items.length}　警告 ${w}　NG ${ng}`; renderKeys(); save()}
function renderKeys(){const keys=['7','8','9','C','4','5','6','BS','1','2','3','決定','↑','0','.','↓']; $('#keys').innerHTML=keys.map(k=>`<button type="button" class="key ${k==='C'?'danger':k==='BS'?'warn':(['↑','↓','決定'].includes(k)?'go':'')}" data-key="${k}">${k}</button>`).join(''); document.querySelectorAll('.key').forEach(b=>{b.addEventListener('click',e=>{e.preventDefault(); press(b.dataset.key);});});}
function selectedItem(){return curP().items[state.selected]} function selectedKey(){return inputKey(selectedItem().id)}
function commit(){const it=selectedItem(); if(!it)return; const v=state.inputs[selectedKey()]||''; judge(v,it); render()}
function scrollSelectedCardToCenter(){const scroller=document.getElementById('cards'); const card=document.getElementById('card-'+state.selected); if(!scroller||!card)return; const target=card.offsetTop-(scroller.clientHeight/2)+(card.offsetHeight/2); scroller.scrollTo({top:Math.max(0,target),behavior:'smooth'});}
function move(delta){commit(); const n=curP().items.length; state.selected=Math.max(0,Math.min(n-1,state.selected+delta)); render(); setTimeout(scrollSelectedCardToCenter,50)}
function press(k){let key=selectedKey(); let v=state.inputs[key]||''; if(k==='C')v=''; else if(k==='BS')v=v.slice(0,-1); else if(k==='決定'){state.inputs[key]=v; commit(); return} else if(k==='↑'){state.inputs[key]=v; move(-1); return} else if(k==='↓'){state.inputs[key]=v; move(1); return} else if(k==='.'&&!v.includes('.'))v+=k; else if(/^[0-9]$/.test(k))v+=k; state.inputs[key]=v; render()}
window.selProduct=i=>{state.currentProduct=i;state.currentSlot=0;state.selected=0;render()}; window.selSlot=i=>{state.currentSlot=i;state.selected=0;render()}; window.selectCard=i=>{state.selected=i;render()};
function show(m){$(m).classList.add('show')} function hideAll(){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('show'))} document.querySelectorAll('[data-close]').forEach(b=>b.onclick=hideAll);
$('#resetBtn').onclick=()=>show('#resetModal'); $('#doReset').onclick=()=>{curP().items.forEach(it=>delete state.inputs[inputKey(it.id)]);hideAll();render()}; $('#settingsBtn').onclick=()=>{renderSettings();show('#settingsModal')};
function renderSettings(){const wrap=$('#settingsList'); wrap.innerHTML=state.products.map((p,pi)=>`<div class="settingsItem"><div class="field"><label>製品名</label><input value="${p.name}" onchange="state.products[${pi}].name=this.value"></div><div class="field"><label>記録枠（カンマ区切り）</label><input value="${p.slots.join(',')}" onchange="state.products[${pi}].slots=this.value.split(',').map(x=>x.trim()).filter(Boolean)"></div><button class="btn" onclick="addItem(${pi})">測定箇所追加</button>${p.items.map((it,ii)=>`<div class="settingsItem"><div class="row"><div class="field"><label>呼称</label><input value="${it.name}" onchange="state.products[${pi}].items[${ii}].name=this.value"></div><div class="field"><label>分類</label><input value="${it.kind||''}" onchange="state.products[${pi}].items[${ii}].kind=this.value"></div><div class="field"><label>規格タイプ</label><select onchange="state.products[${pi}].items[${ii}].specType=this.value"><option value="range" ${((it.specType||'range')==='range')?'selected':''}>範囲</option><option value="upper" ${it.specType==='upper'?'selected':''}>上限のみ</option></select></div><div class="field"><label>下限</label><input type="number" step="any" value="${it.lower??''}" onchange="state.products[${pi}].items[${ii}].lower=this.value===''?null:Number(this.value)"></div><div class="field"><label>上限</label><input type="number" step="any" value="${it.upper}" onchange="state.products[${pi}].items[${ii}].upper=Number(this.value)"></div><div class="field"><label>単位</label><input value="${it.unit||''}" onchange="state.products[${pi}].items[${ii}].unit=this.value"></div><div class="field"><label>警告閾値%</label><input type="number" value="${it.threshold||20}" onchange="state.products[${pi}].items[${ii}].threshold=Number(this.value)"></div></div><div class="field"><label>略図PNG</label><input type="file" accept="image/png,image/jpeg,image/svg+xml" onchange="loadImage(this,${pi},${ii})"></div><button class="btn red" onclick="delItem(${pi},${ii})">削除</button></div>`).join('')}</div>`).join('')}
window.addItem=pi=>{state.products[pi].items.push({id:uid(),name:'新規測定箇所',kind:'mm',unit:'mm',lower:0,upper:1,threshold:20,image:svg('new')});renderSettings()}; window.delItem=(pi,ii)=>{state.products[pi].items.splice(ii,1);renderSettings()};
window.loadImage=(inp,pi,ii)=>{const f=inp.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{state.products[pi].items[ii].image=r.result;renderSettings()}; r.readAsDataURL(f)};
$('#addProduct').onclick=()=>{state.products.push({id:uid(),name:'新規製品',slots:['初物'],items:[]});renderSettings()}; $('#saveSettings').onclick=()=>{hideAll();state.currentProduct=Math.min(state.currentProduct,state.products.length-1);state.currentSlot=0;state.selected=0;render()};
$('#exportJson').onclick=()=>{const blob=new Blob([JSON.stringify({products:state.products},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='measurement-setting.json'; a.click(); URL.revokeObjectURL(a.href)};
$('#importJson').onchange=e=>{const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{const obj=JSON.parse(r.result); if(obj.products){state.products=obj.products;state.currentProduct=0;state.currentSlot=0;state.selected=0;renderSettings();render();alert('読み込みました')}}catch(err){alert('JSONを読み込めませんでした')}}; r.readAsText(f)};
load().then(render);

function suppressTouchScroll(){
  document.querySelectorAll('.key').forEach(el=>{
    el.addEventListener('touchstart', e=>{ e.stopPropagation(); }, {passive:true});
  });
}
setTimeout(suppressTouchScroll,0);
</script></body></html>
